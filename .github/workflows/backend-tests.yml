name: backend-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync

      - name: Run tests
        working-directory: backend
        # LLM_PROVIDER is unset, so the default `stub` provider answers: no key, no
        # SDK, no network, no cloud. The full suite passes with no secrets. Real
        # providers are exercised over mocked HTTP.
        run: uv run pytest -q
