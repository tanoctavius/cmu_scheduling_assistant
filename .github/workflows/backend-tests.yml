name: backend-tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync

      - name: Run tests
        working-directory: backend
        # No ANTHROPIC_API_KEY is set: the orchestrator's deterministic stub is
        # exercised, so the full suite passes with no secrets.
        run: uv run pytest -q
