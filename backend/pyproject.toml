[project]
name = "cmu-scheduler-backend"
version = "0.0.0"
description = "Backend for cmu-scheduler — a conversational course-scheduling assistant for CMU students."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi",
    "uvicorn",
    "pydantic",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-cov",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
